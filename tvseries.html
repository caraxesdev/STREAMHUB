<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamHub - Series</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <header>
        <nav class="navbar glass">
            <div class="nav-brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="var(--primary-color)" xmlns="http://www.w3.org/2000/svg">
                    <path d="M8 5V19L19 12L8 5Z" />
                </svg>
                STREAMHUB
            </div>

            <div class="menu-toggle" id="menu-toggle">
                <div class="hamburger"></div>
            </div>

            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="movies.html">Movies</a></li>
                <li><a href="tvseries.html" class="active">Series</a></li>
                <li><a href="cartoon.html">Cartoons</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </nav>
    </header>

    <!-- TV Series Section -->
    <main>
        <section class="section page-header" data-animate="fade-up">
            <h2 class="section-title">Korean Dubbed Series</h2>
            
            <div class="bento-grid" style="margin-top: 40px;">
                
                <article class="card" data-animate="fade-up">
                    <img src="assets/hima.png" alt="HIMATHUHINA" loading="lazy">
                    <div class="card-overlay">
                        <div class="card-content">
                            <h3 class="card-title">HIMATHUHINA</h3>
                            <div class="card-meta">
                                <span>2024</span>
                                <span>•</span>
                                <span>Drama</span>
                            </div>
                        </div>
                        <a href="Episode/ht.html" class="btn-play-icon" aria-label="Play HIMATHUHINA">
                            <svg viewBox="0 0 24 24"><path d="M8 5V19L19 12L8 5Z"/></svg>
                        </a>
                    </div>
                </article>

                <article class="card delay-100" data-animate="fade-up">
                    <img src="assets/img04.jpg" alt="Mayawarunge Lokaya" loading="lazy">
                    <div class="card-overlay">
                        <div class="card-content">
                            <h3 class="card-title">Mayawarunge Lokaya</h3>
                            <div class="card-meta">
                                <span>Fantasy</span>
                            </div>
                        </div>
                        <a href="Episode/ml.html" class="btn-play-icon" aria-label="Play Mayawarunge Lokaya">
                            <svg viewBox="0 0 24 24"><path d="M8 5V19L19 12L8 5Z"/></svg>
                        </a>
                    </div>
                </article>

                <article class="card delay-200" data-animate="fade-up">
                    <img src="assets/tb.png" alt="True Beauty" loading="lazy">
                    <div class="card-overlay">
                        <div class="card-content">
                            <h3 class="card-title">True Beauty</h3>
                            <div class="card-meta">
                                <span>Romance</span>
                            </div>
                        </div>
                        <a href="Episode/tb.html" class="btn-play-icon" aria-label="Play True Beauty">
                            <svg viewBox="0 0 24 24"><path d="M8 5V19L19 12L8 5Z"/></svg>
                        </a>
                    </div>
                </article>

                <article class="card" data-animate="fade-up">
                    <img src="assets/am.png" alt="AHIMI MATHAKA" loading="lazy">
                    <div class="card-overlay">
                        <div class="card-content">
                            <h3 class="card-title">AHIMI MATHAKA</h3>
                            <div class="card-meta">
                                <span>Drama</span>
                            </div>
                        </div>
                        <a href="Episode/am.html" class="btn-play-icon" aria-label="Play AHIMI MATHAKA">
                            <svg viewBox="0 0 24 24"><path d="M8 5V19L19 12L8 5Z"/></svg>
                        </a>
                    </div>
                </article>
                
                <article class="card delay-100" data-animate="fade-up">
                    <img src="assets/bf.png" alt="Boys Over Flowers" loading="lazy">
                    <div class="card-overlay">
                        <div class="card-content">
                            <h3 class="card-title">Boys Over Flowers</h3>
                            <div class="card-meta">
                                <span>Classic Romance</span>
                            </div>
                        </div>
                        <a href="Episode/bf.html" class="btn-play-icon" aria-label="Play Boys Over Flowers">
                            <svg viewBox="0 0 24 24"><path d="M8 5V19L19 12L8 5Z"/></svg>
                        </a>
                    </div>
                </article>

            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
