<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamHub - Cartoons</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navigation Bar -->
    <header>
        <nav class="navbar glass">
            <div class="nav-brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="var(--primary-color)"
                    xmlns="http://www.w3.org/2000/svg">
                    <path d="M8 5V19L19 12L8 5Z" />
                </svg>
                STREAMHUB
            </div>

            <div class="menu-toggle" id="menu-toggle">
                <div class="hamburger"></div>
            </div>

            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="movies.html">Movies</a></li>
                <li><a href="tvseries.html">Series</a></li>
                <li><a href="cartoon.html" class="active">Cartoons</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </nav>
    </header>

    <!-- Cartoons Section -->
    <main>
        <section class="section page-header" data-animate="fade-up">
            <h2 class="section-title">All Cartoons</h2>

            <div class="bento-grid" style="margin-top: 40px;">

                <article class="card" data-animate="fade-up">
                    <img src="assets/img01.jpg" alt="Ben 10 Classic" loading="lazy">
                    <div class="card-overlay">
                        <div class="card-content">
                            <h3 class="card-title">Ben 10 Classic (Sinhala Dubbed)</h3>
                            <div class="card-meta">
                                <span>Action</span>
                                <span>•</span>
                                <span>Animation</span>
                            </div>
                        </div>
                        <a href="Season/ben10season.html" class="btn-play-icon" aria-label="Play Ben 10">
                            <svg viewBox="0 0 24 24">
                                <path d="M8 5V19L19 12L8 5Z" />
                            </svg>
                        </a>
                    </div>
                </article>

            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
