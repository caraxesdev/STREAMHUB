<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamHub - Player</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
        }

        .navbar {
            z-index: 1000;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0) 100%);
        }

        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>

    <!-- Simple Navigation -->
    <nav class="navbar">
        <div class="nav-brand">STREAMHUB</div>
        <ul class="nav-links">
            <!-- Go back to previous page -->
            <li><a href="javascript:history.back()" style="font-weight:bold; font-size:1.1rem;">← Back</a></li>
        </ul>
    </nav>

    <!-- Video iframe -->
    <div class="video-container">
        <iframe id="videoPlayer" width="100%" height="100%" allow="autoplay" allowfullscreen style="border:none;">
        </iframe>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);

        const id = urlParams.get('id');
        const type = urlParams.get('type');

        const player = document.getElementById('videoPlayer');

        if (id && type) {

            if (type === "drive") {
                player.src = `https://drive.google.com/file/d/${id}/preview`;
            }

            else if (type === "youtube") {
                player.src = `https://www.youtube.com/embed/${id}?autoplay=1`;
            }

            else {
                document.querySelector('.video-container').innerHTML =
                    '<h2 style="color:white;">Unsupported video type.</h2>';
            }

        } else {

            document.querySelector('.video-container').innerHTML =
                '<h2 style="color:white; text-align:center;">No video found.</h2>';

        }
    </script>
</body>

</html>
